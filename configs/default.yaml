# Overnight-grade config for SimCLR + ViT + CIFAR-10 + TTT.
# Tuned for L4 (22GB) with AMP enabled.

experiment:
  name: "simclr-vit-cifar10-ter"
  seed: 42

data:
  dataset: "cifar10"
  data_root: "./data"
  image_size: 32
  num_workers: 4
  batch_size_ssl: 1024
  batch_size_sup: 256
  val_fraction: 0.1
  augment_supervised: true
  randaugment_n: 2
  randaugment_m: 9

model:
  backbone: "vit_tiny"
  patch_size: 4
  embed_dim: 192
  projection_dim: 128
  drop_path_rate: 0.1

simclr:
  epochs: 30
  temperature: 0.2
  learning_rate: 0.003
  weight_decay: 1.0e-4
  warmup_epochs: 10
  use_amp: true
  log_every_n_steps: 20

linear_probe:
  epochs: 30
  learning_rate: 0.001
  weight_decay: 0.0
  warmup_epochs: 0
  use_amp: true

finetune:
  epochs: 30
  learning_rate: 5.0e-4
  weight_decay: 0.05
  warmup_epochs: 3
  label_smoothing: 0.1
  use_amp: true
  early_stopping_patience: 10

ttt:
  enabled: true
  method: "tent"
  steps: 1
  learning_rate: 1.0e-4
  adapt_scope: "norm_only"

logging:
  use_wandb: false
  log_dir: "./logs"

checkpoint:
  dir: "./checkpoints"
  save_best_only: true
