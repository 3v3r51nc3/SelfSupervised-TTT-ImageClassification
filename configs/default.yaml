# Base experiment config template.
# This is a section skeleton, values can be tuned later.

experiment:
  name: "simclr-vit-cifar10-ter"
  seed: 42

data:
  dataset: "cifar10"
  data_root: "./data"
  image_size: 32
  num_workers: 4
  batch_size_ssl: 512
  batch_size_sup: 256
  val_fraction: 0.1

model:
  backbone: "vit_tiny"
  patch_size: 4
  embed_dim: 192
  projection_dim: 128

simclr:
  epochs: 20
  temperature: 0.5
  learning_rate: 0.002
  log_every_n_steps: 10

linear_probe:
  epochs: 30
  learning_rate: 0.001

finetune:
  epochs: 50
  learning_rate: 0.0001

ttt:
  enabled: true
  steps: 3
  learning_rate: 0.00001
  adapt_scope: "norm_only"

logging:
  use_wandb: false
  log_dir: "./logs"

checkpoint:
  dir: "./checkpoints"
  save_best_only: true
